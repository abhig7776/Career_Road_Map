{% extends "base.html" %}
{% block title %}Login - CareerRoadmap AI{% endblock %}
{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-success text-white"><h4><i class="fas fa-sign-in-alt"></i> Welcome Back</h4></div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3 form-check"><input type="checkbox" name="remember" class="form-check-input"><label class="form-check-label">Remember me</label></div>
                    <button type="submit" class="btn btn-success w-100"><i class="fas fa-sign-in-alt"></i> Login</button>
                </form>
                <p class="mt-3 text-center">New here? <a href="{{ url_for('register') }}">Create Account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
