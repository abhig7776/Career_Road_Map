{% extends "base.html" %}
{% block title %}Register - CareerRoadmap AI{% endblock %}
{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white"><h4><i class="fas fa-user-plus"></i> Create Your Account</h4></div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Username *</label><input type="text" name="username" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label>Email *</label><input type="email" name="email" class="form-control" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Password *</label><input type="password" name="password" class="form-control" required minlength="8"><small class="text-muted">Minimum 8 characters</small></div>
                        <div class="col-md-6 mb-3"><label>Confirm Password *</label><input type="password" name="confirm_password" class="form-control" required></div>
                    </div>
                    <hr>
                    <h5><i class="fas fa-user-cog"></i> Profile Information</h5>
                    <div class="mb-3"><label>Your Skills</label><input type="text" name="skills" class="form-control" placeholder="e.g., Python, JavaScript, SQL"><small class="text-muted">Separate with commas</small></div>
                    <div class="mb-3"><label>Education</label><input type="text" name="education" class="form-control" placeholder="e.g., B.Tech Computer Science"></div>
                    <div class="mb-3"><label>Interests</label><input type="text" name="interests" class="form-control" placeholder="e.g., Data Science, Web Development"></div>
                    <div class="mb-3"><label>Career Goal</label><input type="text" name="career_goal" class="form-control" placeholder="e.g., Become a Data Scientist"></div>
                    <div class="mb-3"><label>Certifications</label><input type="text" name="certifications" class="form-control" placeholder="e.g., AWS Certified"></div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-user-check"></i> Register</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
